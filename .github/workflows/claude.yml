name: Build Nothing OS 4.1 Kernel (KSU-Next stable + SUSFS)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: 2. Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git python3 python-is-python3 libssl-dev repo flex bison zip unzip

      - name: 3. Setup Kleaf / Bazel Build Workspace Environment
        run: |
          mkdir -p workspace
          cd workspace
          echo ">> Initializing Android 6.6 Kernel Manifest wrapper..."
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6 --depth=1
          echo ">> Syncing manifest environment..."
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

          echo ">> Constructing Kleaf workspace configuration..."
          if [ -f build/kernel/kleaf/bazel.WORKSPACE ]; then
            TARGET_WS="build/kernel/kleaf/bazel.WORKSPACE"
          elif [ -f build/kernel/kleaf/WORKSPACE ]; then
            TARGET_WS="build/kernel/kleaf/WORKSPACE"
          else
            echo ">> [FATAL] Kleaf Workspace template not found!" && exit 1
          fi

          if [ -f build/kernel/kleaf/bzlmod/bazel.MODULE.bazel ]; then
            TARGET_MOD="build/kernel/kleaf/bzlmod/bazel.MODULE.bazel"
          fi

          rm -f WORKSPACE MODULE.bazel
          cp "$TARGET_WS" WORKSPACE
          chmod +w WORKSPACE
          echo 'local_repository(name = "nt_project", path = "nt_project")' >> WORKSPACE

          if [ -n "$TARGET_MOD" ]; then
            cp "$TARGET_MOD" MODULE.bazel
            chmod +w MODULE.bazel
            echo 'bazel_dep(name = "nt_project")' >> MODULE.bazel
            echo 'local_path_override(module_name = "nt_project", path = "nt_project")' >> MODULE.bazel
          fi

          mkdir -p tools
          ln -sf ../build/kernel/kleaf/bazel.sh tools/bazel

      - name: 4. Checkout Nothing Kernel Source (NOS 4.1)
        uses: actions/checkout@v4
        with:
          repository: NothingOSS/android_kernel_msm-6.6_nothing_sm8735
          ref: sm8735/b/mr
          path: workspace/msm-kernel

      - name: 5. Integrate KSU-Next (stable tag) + SUSFS (both susfs patches)
        working-directory: workspace/msm-kernel
        env:
          TRY_UMOUNT_RECONCILE: |
            import re, sys, os
            p = sys.argv[1]
            if not os.path.exists(p):
                print(">> Target file missing.")
                sys.exit(0)
            src = open(p, encoding="utf-8", errors="ignore").read()
            four_arg_def = re.search(r'void\s+try_umount\s*\([^)]*\buid_t\s+\w+\s*\)', src)
            if not four_arg_def:
                print(">> Definition is not 4-arg; nothing to reconcile.")
                sys.exit(0)
            pattern = re.compile(r'(try_umount\s*\(\s*[^,()]+,\s*(?:true|false)\s*,\s*[A-Za-z0-9_]+)\s*\)')
            fixed, n = pattern.subn(r'\1, 0)', src)
            if n:
                open(p, "w", encoding="utf-8").write(fixed)
                print(f">> Reconciled {n} three-arg try_umount call(s) to 4-arg (uid=0).")
            else:
                print(">> No 3-arg call sites found; definition/callers already consistent.")
        run: |
          set -e

          fail_on_rej() {
            scope="$1"
            rejs=$(find "$scope" -name "*.rej" -not -path "./.git/*" 2>/dev/null || true)
            if [ -n "$rejs" ]; then
              echo ">> [FATAL] Patch rejects under $scope:"
              for r in $rejs; do echo "----- $r -----"; cat "$r"; done
              exit 1
            fi
          }

          symbol_defined() {
            grep -rnE 'susfs_is_current_ksu_domain[[:space:]]*\(void\)' KernelSU-Next/ security/ fs/ 2>/dev/null \
              | grep -vE 'extern|;[[:space:]]*$' | grep -qE '\b(bool|int)\b'
          }

          dump_diag() {
            echo "================= DIAGNOSTICS ================="
            echo ">> KernelSU-Next ref: $(cd KernelSU-Next && git describe --tags 2>/dev/null || git rev-parse --short HEAD)"
            echo ">> KernelSU-Next/kernel layout (dirs):"
            find KernelSU-Next/kernel -maxdepth 2 -type d 2>/dev/null | sed 's#^#     #'
            echo ">> KernelSU-Next .c files:"
            find KernelSU-Next/kernel -name '*.c' 2>/dev/null | sed 's#^#     #'
            echo ">> susfs functions referenced/defined inside KernelSU-Next:"
            grep -rhoE 'susfs_[a-z_]+' KernelSU-Next/ 2>/dev/null | sort -u | sed 's#^#     #' | head -60
            echo ">> susfs4ksu patch files:"
            find /tmp/susfs4ksu -name '*.patch' 2>/dev/null | sed 's#^#     #'
            echo ">> Every occurrence of susfs_is_current_ksu_domain in tree:"
            grep -rn 'susfs_is_current_ksu_domain' KernelSU-Next/ security/ fs/ 2>/dev/null | sed 's#^#     #'
            echo ">> Definition of susfs_is_current_ksu_domain inside susfs4ksu repo (if any):"
            grep -rn 'susfs_is_current_ksu_domain' /tmp/susfs4ksu 2>/dev/null | sed 's#^#     #' | head -20
            echo "==============================================="
          }

          echo ">> STAGE 0: Wipe any pre-existing KSU state"
          rm -rf KernelSU KernelSU-Next SukiSU-Ultra
          [ -L drivers/kernelsu ] && rm -f drivers/kernelsu || true
          [ -d drivers/kernelsu ] && rm -rf drivers/kernelsu || true
          sed -i '/kernelsu/d' drivers/Makefile 2>/dev/null || true
          sed -i '\#drivers/kernelsu/Kconfig#d' drivers/Kconfig 2>/dev/null || true

          echo ">> STAGE 1: Clone KernelSU-Next and check out the latest STABLE tag"
          git clone https://github.com/KernelSU-Next/KernelSU-Next KernelSU-Next
          cd KernelSU-Next
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            git checkout -q "$LATEST_TAG"
            echo ">> Checked out KernelSU-Next stable tag: $LATEST_TAG @ $(git rev-parse --short HEAD)"
          else
            echo ">> [WARN] No tags found; staying on $(git rev-parse --abbrev-ref HEAD)"
          fi
          cd ..
          [ -d KernelSU-Next/kernel ] || { echo ">> [FATAL] KernelSU-Next has no kernel/ dir"; exit 1; }

          echo ">> STAGE 2: Symlink the driver into drivers/kernelsu"
          ln -sf "$(realpath --relative-to=drivers KernelSU-Next/kernel)" drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          echo ">> STAGE 3: Clone susfs4ksu gki-android15-6.6 (simonpunk, HEAD)"
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 /tmp/susfs4ksu
          echo ">> susfs4ksu @ $(cd /tmp/susfs4ksu && git rev-parse --short HEAD)"

          echo ">> STAGE 4: Copy SUSFS VFS sources + headers"
          cp -v /tmp/susfs4ksu/kernel_patches/fs/* fs/
          cp -v /tmp/susfs4ksu/kernel_patches/include/linux/* include/linux/
          if ! grep -q "susfs.o" fs/Makefile; then
            echo "obj-y += susfs.o" >> fs/Makefile
            echo "CFLAGS_susfs.o += -Wno-unused-variable -Wno-unused-function -Wno-error" >> fs/Makefile
          fi
          echo ">> SUSFS header version: $(grep -hoE 'SUSFS_VERSION[[:space:]]*\"[^\"]*\"' include/linux/susfs.h 2>/dev/null | head -1 || echo unknown)"

          echo ">> STAGE 5: Apply SUSFS VFS patch (50_add_susfs, kernel side)"
          GKI_PATCH=$(find /tmp/susfs4ksu -type f -name "50_add_susfs_in_gki-android15-6.6.patch" | head -n 1)
          [ -z "$GKI_PATCH" ] && GKI_PATCH=$(find /tmp/susfs4ksu -type f -name "*.patch" | grep -iE "gki.*6\.6" | head -n 1)
          [ -z "$GKI_PATCH" ] && { echo ">> [FATAL] No GKI android15-6.6 SUSFS VFS patch found."; exit 1; }
          echo ">> VFS patch: $GKI_PATCH"
          patch -p1 --forward --fuzz=3 < "$GKI_PATCH" || true
          fail_on_rej "."

          echo ">> STAGE 6: Ensure susfs_is_current_ksu_domain is DEFINED"
          if symbol_defined; then
            echo ">> Symbol already defined by KernelSU-Next stable (built-in susfs). Good."
          else
            echo ">> Symbol not yet defined. Applying susfs4ksu KSU-side patch..."
            KSU_PATCH=$(find /tmp/susfs4ksu -type f -path "*KernelSU*" -iname "*enable_susfs*.patch" | head -1)
            [ -z "$KSU_PATCH" ] && KSU_PATCH=$(find /tmp/susfs4ksu -type f -path "*KernelSU*" -name "*.patch" | head -1)
            if [ -n "$KSU_PATCH" ]; then
              echo ">> KSU-side susfs patch: $KSU_PATCH"
              ( cd KernelSU-Next && patch -p1 --forward --fuzz=2 < "$KSU_PATCH" ) || \
              ( cd KernelSU-Next/kernel && patch -p1 --forward --fuzz=2 < "$KSU_PATCH" ) || true
              fail_on_rej "KernelSU-Next"
            else
              echo ">> [WARN] No KSU-side susfs patch found in susfs4ksu repo."
            fi
          fi

          echo "=================================================="
          echo ">> STAGE 5b: Reconcile try_umount signature"
          echo "=================================================="
          CH=$(find "$KSU_ROOT" -name "core_hook.c" | head -n 1)
          if [ -n "$CH" ]; then
            python3 -c "$TRY_UMOUNT_RECONCILE" "$CH"
          else
            echo ">> core_hook.c not found under $KSU_ROOT; skipping reconciliation."
          fi
          fail_on_rej "."

          echo ">> STAGE 7: CANARY (real definition check) — fail fast if undefined"
          if ! symbol_defined; then
            echo ">> [FATAL] susfs_is_current_ksu_domain is still NOT defined (only extern/calls)."
            echo ">>         It will be undefined at the vmlinux link. Diagnostics below."
            dump_diag
            exit 1
          fi
          echo ">> CANARY OK — real definition present:"
          grep -rnE 'susfs_is_current_ksu_domain[[:space:]]*\(void\)' KernelSU-Next/ security/ fs/ 2>/dev/null | grep -vE 'extern|;[[:space:]]*$' | grep -E '\b(bool|int)\b' | sed 's#^#     #'

          echo ">> STAGE 8: NOT stubbing fingerprint (preserve the sensor feature)."

      - name: 6. Sanity-check driver + SUSFS wiring before the long build
        working-directory: workspace/msm-kernel
        run: |
          set -e
          echo ">> Verifying driver + susfs are wired in"
          if ! ls drivers/kernelsu/*.c >/dev/null 2>&1; then
            echo ">> [FATAL] no .c sources under drivers/kernelsu (symlink broken or empty)"
            ls -la drivers/kernelsu || true
            exit 1
          fi
          echo ">> Driver sources present:"
          ls drivers/kernelsu/*.c | sed 's#^#   #'
          [ -e fs/susfs.c ]                  || { echo ">> [FATAL] fs/susfs.c missing"; exit 1; }
          [ -e include/linux/susfs.h ]       || { echo ">> [FATAL] include/linux/susfs.h missing"; exit 1; }
          grep -q "susfs.o" fs/Makefile      || { echo ">> [FATAL] susfs.o not in fs/Makefile"; exit 1; }
          grep -q "kernelsu" drivers/Makefile|| { echo ">> [FATAL] kernelsu not in drivers/Makefile"; exit 1; }
          echo ">> OK: driver + SUSFS VFS present and wired."

      - name: 7. Debug - dump module Makefile (ground truth)
        working-directory: workspace/msm-kernel
        run: |
          echo "===== kernel/module/Makefile (numbered) ====="
          cat -n kernel/module/Makefile || true
          echo "===== grep gki_module ====="
          grep -n "gki_module" kernel/module/Makefile || true

      - name: 8. Protected-Exports Neutralization (POSIX-clean zero-symbol header)
        working-directory: workspace/msm-kernel
        shell: python
        env:
          PROTECTED_EXPORTS_PATCH: |
            import sys, os
            p = sys.argv[1]
            if os.path.exists(p):
                lines = open(p, encoding="utf-8", errors="ignore").read().splitlines(keepends=True)
                out, i = [], 0
                target = "gki_module_protected_exports.h"
                while i < len(lines):
                    line = lines[i]
                    if target in line and ":" in line and not line.lstrip().startswith("#"):
                        rule_target = line.split(":")[0].rstrip()
                        out.append(rule_target + ": FORCE\n")
                        out.append("\t$(Q)mkdir -p $(dir $@)\n")
                        out.append("\t$(Q): > $@\n")
                        i += 1
                        while i < len(lines) and (lines[i].startswith("\t") or lines[i].strip() == ""):
                            if lines[i].strip() == "":
                                j = i + 1
                                while j < len(lines) and lines[j].strip() == "":
                                    j += 1
                                if j < len(lines) and lines[j].startswith("\t"):
                                    i += 1
                                    continue
                                break
                            i += 1
                        continue
                    out.append(line)
                    i += 1
                open(p, "w", encoding="utf-8").write("".join(out))
                print(">> Patched recipe for %s" % target)
        run: |
          import os
          import sys

          print(">> Neutralize protected-export ENFORCEMENT (POSIX-clean)")

          pe_file = "android/abi_gki_protected_exports_aarch64"
          os.makedirs(os.path.dirname(pe_file), exist_ok=True)
          if not os.path.exists(pe_file):
              open(pe_file, "w", encoding="utf-8").close()

          mod_mk = "kernel/module/Makefile"
          if os.path.exists(mod_mk):
              print(f">> Rewriting protected-exports recipe inside: {mod_mk}")
              # Run the multi-line patch environment snippet safely
              import subprocess
              subprocess.run([sys.executable, "-c", os.environ["PROTECTED_EXPORTS_PATCH"], mod_mk], check=True)

          gen_script = "scripts/gen_gki_modules_headers.sh"
          if os.path.exists(gen_script):
              print(">> Neutralizing %s (POSIX-clean, dash-safe)." % gen_script)
              content = (
                  "#!/bin/sh\n"
                  "out=\"$1\"\n"
                  "if [ -z \"$out\" ]; then\n"
                  "    exit 0\n"
                  "fi\n"
                  "dir=$(dirname \"$out\")\n"
                  "mkdir -p \"$dir\"\n"
                  "base=$(basename \"$out\")\n"
                  ": > \"$out\"\n"
                  "case \"$base\" in\n"
                  "    gki_module_unprotected.h)\n"
                  "        printf '%s\\n' '#ifndef _GKI_MODULE_UNPROTECTED_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define _GKI_MODULE_UNPROTECTED_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define NR_UNPROTECTED_SYMBOLS 0' >> \"$out\"\n"
                  "        printf '%s\\n' '#define MAX_UNPROTECTED_NAME_LEN 1' >> \"$out\"\n"
                  "        printf '%s\\n' 'static const char gki_unprotected_symbols[NR_UNPROTECTED_SYMBOLS][MAX_UNPROTECTED_NAME_LEN] = {};' >> \"$out\"\n"
                  "        printf '%s\\n' '#endif' >> \"$out\"\n"
                  "        ;;\n"
                  "    *)\n"
                  "        printf '%s\\n' '#ifndef _GKI_MODULE_PROTECTED_EXPORTS_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define _GKI_MODULE_PROTECTED_EXPORTS_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define NR_PROTECTED_EXPORTS_SYMBOLS 0' >> \"$out\"\n"
                  "        printf '%s\\n' '#define MAX_PROTECTED_EXPORTS_NAME_LEN 1' >> \"$out\"\n"
                  "        printf '%s\\n' 'static const char gki_protected_exports_symbols[NR_PROTECTED_EXPORTS_SYMBOLS][MAX_PROTECTED_EXPORTS_NAME_LEN] = {};' >> \"$out\"\n"
                  "        printf '%s\\n' '#endif' >> \"$out\"\n"
                  "        ;;\n"
                  "esac\n"
                  "exit 0\n"
              )
              with open(gen_script, "w", encoding="utf-8") as f:
                  f.write(content)
              os.chmod(gen_script, 0o755)
          else:
              print(">> [WARN] %s not found; header generation untouched." % gen_script)

          for bzl_file in ["BUILD.bazel", "modules.bzl"]:
              if os.path.exists(bzl_file):
                  lines = open(bzl_file, encoding="utf-8", errors="ignore").read().splitlines()
                  cleaned = [l for l in lines if "abi_gki_protected_exports" not in l]
                  if len(cleaned) != len(lines):
                      with open(bzl_file, "w", encoding="utf-8") as f:
                          f.write("\n".join(cleaned) + "\n")
                      print(">> Purged protected references out of: %s" % bzl_file)

      - name: 9. Validate generated header script (dash + cc syntax check)
        working-directory: workspace/msm-kernel
        run: |
          set -e
          GEN="scripts/gen_gki_modules_headers.sh"
          if [ -f "$GEN" ]; then
            dash -n "$GEN" || { echo ">> [FATAL] $GEN not valid POSIX sh"; exit 1; }
            tmpd=$(mktemp -d)
            for hdr in gki_module_protected_exports.h gki_module_unprotected.h; do
              dash "$GEN" "$tmpd/$hdr" "$PWD" /dev/null
              echo "#include \"$tmpd/$hdr\"" > "$tmpd/probe.c"
              echo "int main(void){return 0;}" >> "$tmpd/probe.c"
              cc -fsyntax-only "$tmpd/probe.c" || { echo ">> [FATAL] generated $hdr does not compile"; exit 1; }
              echo ">> $hdr: OK"
            done
            rm -rf "$tmpd"
          fi

      - name: 10. Inject KSU + full SUSFS flags + KPM; exclude vendor fp module from build
        working-directory: workspace/msm-kernel
        run: |
          find arch/arm64/configs/ -type f \( -name "*_defconfig" -o -name "*.config" -o -name "*.fragment" \) \
            -exec sh -c '
              f="$1"
              echo "CONFIG_KSU=y" >> "$f"
              echo "CONFIG_KPROBES=y" >> "$f"
              echo "CONFIG_HAVE_KPROBES=y" >> "$f"
              echo "CONFIG_KPROBE_EVENTS=y" >> "$f"
              echo "CONFIG_KALLSYMS=y" >> "$f"
              echo "CONFIG_KALLSYMS_ALL=y" >> "$f"
              echo "CONFIG_KPM=y" >> "$f"
              echo "CONFIG_KSU_SUSFS=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$f"
              echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$f"
              echo "# CONFIG_GOODIX_FINGERPRINT is not set" >> "$f"
            ' _ {} \;

      - name: 11. Prepare Qualcomm Build Package Extensions
        working-directory: workspace
        run: |
          mkdir -p build
          touch build/BUILD.bazel
          if [ -f msm-kernel/msm_kernel_extensions.bzl ]; then
            cp msm-kernel/msm_kernel_extensions.bzl build/
          elif [ -f msm-kernel/build/msm_kernel_extensions.bzl ]; then
            cp msm-kernel/build/msm_kernel_extensions.bzl build/
          else
            echo "def define_top_level_rules(): pass" > build/msm_kernel_extensions.bzl
            echo "def define_extras(*args, **kwargs): pass" >> build/msm_kernel_extensions.bzl
            echo "def get_build_config_fragments(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def get_dtb_list(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def get_dtbo_list(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def get_dtstree(*args, **kwargs): return \"\"" >> build/msm_kernel_extensions.bzl
            echo "def get_gki_ramdisk_prebuilt_binary(*args, **kwargs): return \"\"" >> build/msm_kernel_extensions.bzl
            echo "def get_vendor_ramdisk_binaries(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def define_combined_vm_image(*args, **kwargs): pass" >> build/msm_kernel_extensions.bzl
          fi

      - name: 12. Sanitize Obsolete Parameters & Mock OEM Layers
        working-directory: workspace
        shell: python
        run: |
          import os
          import re

          def remove_attribute(content, attr_name):
              pattern = r'\b' + attr_name + r'\s*=\s*'
              while True:
                  match = re.search(pattern, content)
                  if not match:
                      break
                  start_idx = match.start()
                  end_idx = match.end()
                  bracket_count = paren_count = brace_count = 0
                  while end_idx < len(content):
                      char = content[end_idx]
                      if char == '(': paren_count += 1
                      elif char == ')': paren_count -= 1
                      elif char == '[': bracket_count += 1
                      elif char == ']': bracket_count -= 1
                      elif char == '{': brace_count += 1
                      elif char == '}': brace_count -= 1
                      elif char == ',' and bracket_count == 0 and paren_count == 0 and brace_count == 0:
                          end_idx += 1
                          break
                      elif char == '\n' and bracket_count == 0 and paren_count == 0 and brace_count == 0:
                          break
                      end_idx += 1
                  content = content[:start_idx] + content[end_idx:]
              return content

          os.makedirs("nt_project", exist_ok=True)
          with open("nt_project/BUILD.bazel", "w") as f: f.write("")
          with open("nt_project/MODULE.bazel", "w") as f: f.write('module(name = "nt_project")\n')

          symbols = {}

          for root, dirs, files in os.walk("build/kernel"):
              for file in files:
                  if file.endswith((".sh", ".py", ".bzl", ".bsh", ".gki")):
                      p = os.path.join(root, file)
                      try:
                          with open(p, "r", encoding="utf-8", errors="ignore") as f:
                              content = f.read()
                          mutated = False
                          if "check_defconfig" in content:
                              content = re.sub(r'check_defconfig\s*\(\s*\)\s*\{', 'check_defconfig() {\n  return 0\n', content)
                              content = content.replace('POST_DEFCONFIG_CMDS="check_defconfig"', 'POST_DEFCONFIG_CMDS=""')
                              content = content.replace('POST_DEFCONFIG_CMDS=\"check_defconfig\"', 'POST_DEFCONFIG_CMDS=\"\"')
                              mutated = True
                          if "savedefconfig does not match" in content:
                              content = content.replace("return ${RES}", "return 0")
                              content = content.replace("return $RES", "return 0")
                              content = content.replace("exit ${RES}", "exit 0")
                              content = content.replace("exit $RES", "exit 0")
                              mutated = True
                          if mutated:
                              print("[*] Neutralized defconfig validation in: %s" % p)
                              with open(p, "w", encoding="utf-8") as f:
                                  f.write(content)
                      except Exception as e:
                          print("File patching error: %s" % e)

          for root, dirs, files in os.walk("msm-kernel"):
              for file in files:
                  if file.endswith(".bzl") or file in ["BUILD", "BUILD.bazel"]:
                      fn = os.path.join(root, file)
                      try:
                          with open(fn, "r", encoding="utf-8", errors="ignore") as f:
                              content = f.read()
                          mutated = False
                          if "gki_ramdisk_prebuilt_binary" in content:
                              content = remove_attribute(content, "gki_ramdisk_prebuilt_binary")
                              mutated = True
                          if "nt_project" in content:
                              matches = re.findall(r"load\s*\(\s*[\"\']@nt_project//:dict\.bzl[\"\']\s*,\s*([^)]+)\)", content)
                              for match in matches:
                                  for part in match.split(","):
                                      part = part.strip()
                                      if not part: continue
                                      if "=" in part:
                                          sym = part.split("=")[1].strip().strip('"').strip("'")
                                      else:
                                          sym = part.strip("\"").strip("'")
                                      if sym:
                                          if "module" in sym.lower() or "out" in sym.lower() or "+" in content:
                                              symbols[sym] = "[]"
                                          else:
                                              symbols[sym] = '{"metroid": {}, "sun": {}, "pacman": {}, "pong": {}, "spock": {}, "default": {}}'
                          if mutated:
                              with open(fn, "w", encoding="utf-8") as f:
                                  f.write(content)
                      except Exception as e:
                          print("[!] Error processing %s: %s" % (fn, e))

          with open("nt_project/dict.bzl", "w") as f:
              for sym, val in symbols.items():
                  f.write("%s = %s\n" % (sym, val))

      - name: 13. Compile the Kernel via Qualcomm Kleaf
        working-directory: workspace
        run: |
          echo ">> Commencing Kernel Compilation via Qualcomm Bazel..."
          tools/bazel run //msm-kernel:kernel_aarch64_dist -- --dist_dir=out_dist

      - name: 14. Upload Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: boot-img-nos4.1-ksunext-susfs
          path: workspace/out_dist/boot.img
          compression-level: 9
