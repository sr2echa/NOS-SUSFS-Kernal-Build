name: DIAGNOSTIC - KSU-Next v3.2.0 + SUSFS symbol/version audit

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install patchutils
        run: sudo apt-get update && sudo apt-get install -y patchutils

      - name: Clone KernelSU-Next (stable tag) + susfs4ksu (HEAD)
        run: |
          set -e
          git clone https://github.com/KernelSU-Next/KernelSU-Next KSU
          cd KSU
          TAG=$(git describe --tags --abbrev=0)
          git checkout -q "$TAG"
          echo "KSU_TAG=$TAG" >> "$GITHUB_ENV"
          echo ">> KSU-Next tag: $TAG @ $(git rev-parse --short HEAD)"
          cd ..
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6 SUSFS
          echo ">> susfs4ksu @ $(cd SUSFS && git rev-parse --short HEAD)"

      - name: "AUDIT 1 — KSU-Next tree + version markers"
        run: |
          echo "===== KSU-Next tag: $KSU_TAG ====="
          echo "----- kernel/ files -----"
          find KSU/kernel -maxdepth 2 -type f | sort
          echo "----- version / susfs config markers -----"
          grep -rn 'KSU_VERSION\|VERSION_TAG\|SUSFS' KSU/kernel/Makefile KSU/kernel/Kconfig 2>/dev/null || true

      - name: "AUDIT 2 — is susfs_is_current_ksu_domain referenced in v3.2.0?"
        run: |
          echo "===== susfs_is_current_ksu_domain in KSU-Next ====="
          grep -rn 'susfs_is_current_ksu_domain' KSU/ || echo "   (NOT referenced anywhere in KSU-Next $KSU_TAG)"

      - name: "AUDIT 3 — every susfs_ symbol KSU-Next expects"
        run: |
          echo "===== susfs_ symbols referenced in KSU-Next (with counts) ====="
          grep -rhoE '\bsusfs_[a-zA-Z0-9_]+' KSU/kernel | sort | uniq -c | sort -rn

      - name: "AUDIT 4 — the build-#7 errored functions, in CLEAN v3.2.0"
        run: |
          echo "===== ksu_handle_setresuid / ksu_execve_hook_ksud / ksu_hook_setresuid (clean tree) ====="
          grep -rn 'ksu_handle_setresuid\|ksu_execve_hook_ksud\|ksu_hook_setresuid\|ksu_handle_execve_ksud' KSU/kernel || echo "   (none)"

      - name: "AUDIT 5 — susfs.c <-> KSU interface (HEAD)"
        run: |
          echo "===== susfs.h SUSFS_VERSION ====="
          grep -hn 'SUSFS_VERSION' SUSFS/kernel_patches/include/linux/susfs.h || true
          echo "===== susfs.c extern declarations (what it expects KSU to define) ====="
          grep -nE 'extern ' SUSFS/kernel_patches/fs/susfs.c || true
          echo "===== susfs.c call sites of susfs_is_current_ksu_domain ====="
          grep -n 'susfs_is_current_ksu_domain' SUSFS/kernel_patches/fs/susfs.c || true

      - name: "AUDIT 6 — how the KSU-side patch DEFINES the symbol (+ rename evidence)"
        run: |
          KP=$(find SUSFS -path '*KernelSU*' -iname '*enable_susfs*.patch' | head -1)
          echo ">> patch: $KP"
          echo "===== files the patch touches ====="
          lsdiff "$KP" | sed 's#^#   #'
          echo "===== where the relevant symbols appear in the patch ====="
          grep -nE 'susfs_is_current_ksu_domain|ksu_handle_setresuid|ksu_execve_hook_ksud|ksu_hook_setresuid' "$KP" | sed 's#^#   #'
          echo "===== FULL selinux.c hunk (contains the definition) ====="
          filterdiff -i '*selinux.c' "$KP" | cat
          echo "===== FULL selinux.h hunk ====="
          filterdiff -i '*selinux.h' "$KP" | cat

      - name: "AUDIT 7 — does v3.2.0's selinux.c have the deps the definition needs?"
        run: |
          echo "===== KSU-Next selinux.c sid/domain handling ====="
          grep -n 'current_sid\|ksu_sid\|ksu.*sid\|sid.*ksu\|is_ksu\|u:r:' KSU/kernel/selinux/selinux.c || echo "   (none found)"
          echo "----- selinux.c function signatures -----"
          grep -nE '^(bool|int|void|static|long|u32|unsigned)[^=;]*\b[a-z_]+[[:space:]]*\(' KSU/kernel/selinux/selinux.c | sed 's#^#   #'
          echo "----- selinux.h (full) -----"
          cat KSU/kernel/selinux/selinux.h
