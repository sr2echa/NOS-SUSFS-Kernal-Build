name: Build NOS 4.1 Kernel (NP3 / metroid) - KSU-Next [next-susfs] + SUSFS v2.1.0

# ============================================================================
# WHAT CHANGED vs your failing workflow (and why it fixes the sucompat.c errors)
# ----------------------------------------------------------------------------
# ROOT CAUSE of build #N failing at sucompat.c:
#   You cloned KernelSU-Next's DEFAULT (`next`) branch HEAD and then tried to
#   bolt SUSFS on with TheWildJames `susfs_fix_patches`. Those fix patches are
#   cut against ONE specific KSU-Next commit. Your `apply_ksun_patch` helper
#   SILENTLY SKIPS any patch that doesn't apply cleanly ("SKIPPED (no clean
#   apply)"). So when KSU-Next HEAD drifted, the patch that defines the SUSFS
#   bridge + reconciles sucompat.c got skipped, while others applied -> an
#   internally-inconsistent driver. That is exactly:
#     * redefinition of 'ksu_su_compat_enabled' (static_key vs bool)  -> .c/.h drift
#     * 'ksu_adb_root_handle_execve' 2-arg vs 1-arg                   -> .c/.h drift
#     * undeclared SUSFS_MAX_LEN_PATHNAME / susfs_*_proc_umounted     -> susfs glue skipped
#     * incomplete 'struct user_arg_ptr', undeclared 'is_init'        -> MANUAL HOOKS
#                                                                         patch never applied
#
# THE FIX (this file):
#   1) Use the INTEGRATED `next-susfs` branch via KSU-Next's own setup.sh.
#      Its sucompat.c already contains coherent SUSFS hooks -> NO fix-patch matrix.
#   2) Apply the susfs4ksu `60_scope-minimized_manual_hooks.patch` (you were
#      missing it). It provides struct user_arg_ptr / get_user_arg_ptr / is_init
#      and the fs/exec.c|open.c|stat.c hook calls the integrated driver expects.
#   3) Pin SUSFS to the gki-android15-6.6 line (SUSFS v2.1.0) and assert v2.x.
#   4) Let setup.sh wire drivers/Makefile + drivers/Kconfig (don't hand-symlink,
#      which double-wires).
#   5) Keep your (working) Kleaf harness, protected-export neutralization and
#      defconfig sanitization untouched.
#
# FEATURE PRESERVATION (Glyph Matrix / camera / fingerprint):
#   We never stub or remove anything from Nothing's defconfig. Step 10 is
#   APPEND-ONLY. Vendor drivers build from Nothing's tree as-is. The only thing
#   we relax is the GKI protected-export ENFORCEMENT (steps 8-9) which is
#   required for ANY out-of-tree/vendor module to load (Wi-Fi/BT/etc.).
# ============================================================================

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  # ---- PINNED INPUTS (the whole point: no floating HEADs) -------------------
  KERNEL_REPO: "NothingOSS/android_kernel_msm-6.6_nothing_sm8735"
  KERNEL_REF:  "sm8735/b/mr"
  SUSFS_BRANCH: "gki-android15-6.6"   # SUSFS v2.1.0 line for android15-6.6
  KSUN_BRANCH:  "next-susfs"          # KSU-Next branch with SUSFS BUILT IN
  # Once you get a green build, replace the branch clones below with the exact
  # commit SHAs they resolved to (printed in the logs) for full reproducibility.

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: 2. Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git python3 python-is-python3 libssl-dev repo flex bison zip unzip

      - name: 3. Setup Kleaf / Bazel Build Workspace Environment
        run: |
          mkdir -p workspace
          cd workspace
          echo ">> Initializing Android 6.6 Kernel Manifest wrapper..."
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6 --depth=1
          echo ">> Syncing manifest environment..."
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

          echo ">> Constructing Kleaf workspace configuration..."
          if [ -f build/kernel/kleaf/bazel.WORKSPACE ]; then
            TARGET_WS="build/kernel/kleaf/bazel.WORKSPACE"
          elif [ -f build/kernel/kleaf/WORKSPACE ]; then
            TARGET_WS="build/kernel/kleaf/WORKSPACE"
          else
            echo ">> [FATAL] Kleaf Workspace template not found!" && exit 1
          fi

          if [ -f build/kernel/kleaf/bzlmod/bazel.MODULE.bazel ]; then
            TARGET_MOD="build/kernel/kleaf/bzlmod/bazel.MODULE.bazel"
          fi

          rm -f WORKSPACE MODULE.bazel
          cp "$TARGET_WS" WORKSPACE
          chmod +w WORKSPACE
          echo 'local_repository(name = "nt_project", path = "nt_project")' >> WORKSPACE

          if [ -n "$TARGET_MOD" ]; then
            cp "$TARGET_MOD" MODULE.bazel
            chmod +w MODULE.bazel
            echo 'bazel_dep(name = "nt_project")' >> MODULE.bazel
            echo 'local_path_override(module_name = "nt_project", path = "nt_project")' >> MODULE.bazel
          fi

          mkdir -p tools
          ln -sf ../build/kernel/kleaf/bazel.sh tools/bazel

      - name: 4. Checkout Nothing Kernel Source (NOS 4.1)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.KERNEL_REPO }}
          ref: ${{ env.KERNEL_REF }}
          path: workspace/msm-kernel

      - name: 5. Integrate KSU-Next (next-susfs, INTEGRATED) + SUSFS v2.1.0 VFS + manual hooks
        working-directory: workspace/msm-kernel
        shell: bash
        run: |
          set -e

          echo ">> STAGE 0: Clean any prior KSU/SUSFS state (avoid double-wiring)"
          rm -rf KernelSU KernelSU-Next SukiSU-Ultra /tmp/susfs4ksu
          [ -L drivers/kernelsu ] && rm -f drivers/kernelsu || true
          [ -d drivers/kernelsu ] && rm -rf drivers/kernelsu || true
          # IMPORTANT: do NOT pre-edit drivers/Makefile or drivers/Kconfig here.
          # KSU-Next's setup.sh wires them itself; pre-editing creates duplicate
          # entries / breaks the symlink it creates.

          echo ">> STAGE 1: Clone susfs4ksu (simonpunk) @ ${SUSFS_BRANCH}  [SUSFS v2.1.0]"
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b "${SUSFS_BRANCH}" /tmp/susfs4ksu
          echo ">> susfs4ksu @ $(git -C /tmp/susfs4ksu rev-parse --short HEAD)  <-- pin this SHA later"

          echo ">> STAGE 2: Copy SUSFS kernel-side VFS sources + headers into the tree"
          cp -v /tmp/susfs4ksu/kernel_patches/fs/* fs/
          cp -v /tmp/susfs4ksu/kernel_patches/include/linux/* include/linux/

          echo ">> STAGE 3: Assert SUSFS is v2.x (we asked for the v2.1.0 branch)"
          SUSFS_VER=$(grep -rhoE '#define[[:space:]]+SUSFS_VERSION[[:space:]]+"[^"]+"' include/linux/ \
                        | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          echo ">> Detected SUSFS_VERSION: ${SUSFS_VER:-<none>}"
          case "$SUSFS_VER" in
            2.*) echo ">> OK: SUSFS v2.x confirmed." ;;
            *)   echo ">> [FATAL] Expected SUSFS v2.x on ${SUSFS_BRANCH}, got '${SUSFS_VER:-none}'."; exit 1 ;;
          esac

          echo ">> STAGE 4: Apply SUSFS kernel-side VFS patch (50_add_susfs)"
          GKI_PATCH=$(find /tmp/susfs4ksu/kernel_patches -maxdepth 1 -name '50_add_susfs_in_gki-android15-6.6.patch' | head -1)
          [ -z "$GKI_PATCH" ] && GKI_PATCH=$(find /tmp/susfs4ksu/kernel_patches -maxdepth 1 -name '50_add_susfs_in_gki-*6.6*.patch' | head -1)
          [ -n "$GKI_PATCH" ] || { echo ">> [FATAL] 50_add_susfs patch not found"; exit 1; }
          echo ">> VFS patch: $GKI_PATCH"
          patch -p1 --no-backup-if-mismatch --fuzz=3 < "$GKI_PATCH"

          echo ">> STAGE 5: Apply scope-minimized MANUAL HOOKS patch (60_*)  <-- you were missing this"
          # Provides: struct user_arg_ptr, get_user_arg_ptr(), is_init(), and the
          # kernel-source hook calls the integrated next-susfs sucompat.c relies on.
          HOOK_PATCH=$(find /tmp/susfs4ksu/kernel_patches -maxdepth 1 -name '60_scope-minimized_manual_hooks.patch' | head -1)
          if [ -n "$HOOK_PATCH" ]; then
            echo ">> Manual hooks patch: $HOOK_PATCH"
            patch -p1 --no-backup-if-mismatch --fuzz=3 < "$HOOK_PATCH"
          else
            echo ">> [FATAL] 60_scope-minimized_manual_hooks.patch not found on ${SUSFS_BRANCH}."
            echo ">>         Required for the integrated next-susfs driver to compile."
            exit 1
          fi

          echo ">> STAGE 6: Fail HARD on any reject (never proceed on a partial tree)"
          REJ=$(find . -name '*.rej' -not -path './.git/*' 2>/dev/null || true)
          if [ -n "$REJ" ]; then
            echo ">> [FATAL] Patch rejects present:"
            for r in $REJ; do echo "----- $r -----"; cat "$r"; done
            exit 1
          fi

          echo ">> STAGE 6b: Belt-and-suspenders fs/Makefile wiring for susfs.o"
          if ! grep -q 'susfs\.o' fs/Makefile; then
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile
          fi
          grep -q 'CFLAGS_susfs.o' fs/Makefile || \
            echo 'CFLAGS_susfs.o += -Wno-unused-variable -Wno-unused-function -Wno-error' >> fs/Makefile

          echo ">> STAGE 7: Install KernelSU-Next WITH integrated SUSFS (branch: ${KSUN_BRANCH})"
          # setup.sh from next-susfs installs a driver whose sucompat.c is already
          # coherent with SUSFS v2.x. No WildJames fix patches -> no silent skips.
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/${KSUN_BRANCH}/kernel/setup.sh" | bash -s "${KSUN_BRANCH}"
          if [ ! -e drivers/kernelsu ] && [ ! -d KernelSU-Next ]; then
            echo ">> [FATAL] KSU-Next setup did not produce the driver"; exit 1
          fi
          echo ">> KSU-Next version metadata:"
          ( cd KernelSU-Next 2>/dev/null && echo "   ref: $(git rev-parse --abbrev-ref HEAD 2>/dev/null) @ $(git rev-parse --short HEAD 2>/dev/null)" ) || true
          echo ">> KSU-Next driver sources:"
          ls drivers/kernelsu/*.c 2>/dev/null | sed 's/^/   /' || ls KernelSU-Next/kernel/*.c | sed 's/^/   /'

          echo ">> STAGE 8: PRE-BUILD CANARY — assert the EXACT symbols that failed before"
          # 8a. was: 'use of undeclared identifier SUSFS_MAX_LEN_PATHNAME'
          grep -rqsE 'define[[:space:]]+SUSFS_MAX_LEN_PATHNAME' include/linux/ \
            || { echo ">> [FATAL] SUSFS_MAX_LEN_PATHNAME not defined in headers"; exit 1; }
          # 8b. was: 'variable has incomplete type struct user_arg_ptr' / 'undeclared is_init'
          #     'struct user_arg_ptr' exists natively in stock fs/exec.c, so it is a
          #     poor discriminator. Instead assert the 60_ patch actually INSERTED the
          #     KSU exec hook into fs/exec.c (that call is absent on a stock tree).
          grep -rqs 'ksu_handle_execve' fs/exec.c \
            || { echo ">> [FATAL] manual hooks not applied (no ksu_handle_execve* hook in fs/exec.c)"; exit 1; }
          # 8c. was: 'undeclared susfs_set_current_proc_umounted / susfs_is_current_proc_umounted'
          grep -rqs 'susfs_set_current_proc_umounted' fs/susfs.c include/linux/ \
            || { echo ">> [FATAL] susfs umount helpers missing (susfs4ksu version mismatch)"; exit 1; }
          echo ">> CANARY OK: susfs headers + manual hooks + susfs helpers all present."

          echo ">> STAGE 9: NOT stubbing any Nothing vendor driver."
          echo ">> Glyph Matrix / camera / fingerprint build from Nothing's defconfig untouched."
          [ -e drivers/input/fingerprint/Makefile ] && echo ">> fingerprint dir present (preserved)" || echo ">> (no separate fingerprint dir in this tree)"

      - name: 6. Sanity-check driver + SUSFS wiring before the long build
        working-directory: workspace/msm-kernel
        shell: bash
        run: |
          set -e
          echo ">> Verifying driver + susfs are wired in"
          if ! ls drivers/kernelsu/*.c >/dev/null 2>&1; then
            echo ">> [FATAL] no .c sources under drivers/kernelsu (symlink broken or empty)"
            ls -la drivers/kernelsu || true
            exit 1
          fi
          echo ">> Driver sources present:"
          ls drivers/kernelsu/*.c | sed 's#^#   #'
          [ -e fs/susfs.c ]                   || { echo ">> [FATAL] fs/susfs.c missing"; exit 1; }
          ls include/linux/susfs*.h >/dev/null 2>&1 || { echo ">> [FATAL] susfs headers missing"; exit 1; }
          grep -q 'susfs\.o'  fs/Makefile      || { echo ">> [FATAL] susfs.o not in fs/Makefile"; exit 1; }
          grep -q 'kernelsu'  drivers/Makefile || { echo ">> [FATAL] kernelsu not in drivers/Makefile"; exit 1; }
          echo ">> Fingerprint driver preserved:"
          [ -e drivers/input/fingerprint/Makefile ] && head -n 3 drivers/input/fingerprint/Makefile || echo "   (no fingerprint dir in this tree)"
          echo ">> OK: driver + SUSFS VFS present and wired; fingerprint intact."

      - name: 7. Debug - dump module Makefile (ground truth)
        working-directory: workspace/msm-kernel
        run: |
          echo "===== kernel/module/Makefile (numbered) ====="
          cat -n kernel/module/Makefile || true
          echo "===== grep gki_module ====="
          grep -n "gki_module" kernel/module/Makefile || true

      - name: 8. Protected-Exports Neutralization (POSIX-clean zero-symbol header)
        working-directory: workspace/msm-kernel
        shell: python
        run: |
          import os

          print(">> Neutralize protected-export ENFORCEMENT (POSIX-clean)")

          pe_file = "android/abi_gki_protected_exports_aarch64"
          os.makedirs(os.path.dirname(pe_file), exist_ok=True)
          if not os.path.exists(pe_file):
              open(pe_file, "w", encoding="utf-8").close()

          gen_script = "scripts/gen_gki_modules_headers.sh"
          if os.path.exists(gen_script):
              print(">> Neutralizing %s (POSIX-clean, dash-safe)." % gen_script)
              content = (
                  "#!/bin/sh\n"
                  "out=\"$1\"\n"
                  "if [ -z \"$out\" ]; then\n"
                  "    exit 0\n"
                  "fi\n"
                  "dir=$(dirname \"$out\")\n"
                  "mkdir -p \"$dir\"\n"
                  "base=$(basename \"$out\")\n"
                  ": > \"$out\"\n"
                  "case \"$base\" in\n"
                  "    gki_module_unprotected.h)\n"
                  "        printf '%s\\n' '#ifndef _GKI_MODULE_UNPROTECTED_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define _GKI_MODULE_UNPROTECTED_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define NR_UNPROTECTED_SYMBOLS 0' >> \"$out\"\n"
                  "        printf '%s\\n' '#define MAX_UNPROTECTED_NAME_LEN 1' >> \"$out\"\n"
                  "        printf '%s\\n' 'static const char gki_unprotected_symbols[NR_UNPROTECTED_SYMBOLS][MAX_UNPROTECTED_NAME_LEN] = {};' >> \"$out\"\n"
                  "        printf '%s\\n' '#endif' >> \"$out\"\n"
                  "        ;;\n"
                  "    *)\n"
                  "        printf '%s\\n' '#ifndef _GKI_MODULE_PROTECTED_EXPORTS_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define _GKI_MODULE_PROTECTED_EXPORTS_H' >> \"$out\"\n"
                  "        printf '%s\\n' '#define NR_PROTECTED_EXPORTS_SYMBOLS 0' >> \"$out\"\n"
                  "        printf '%s\\n' '#define MAX_PROTECTED_EXPORTS_NAME_LEN 1' >> \"$out\"\n"
                  "        printf '%s\\n' 'static const char gki_protected_exports_symbols[NR_PROTECTED_EXPORTS_SYMBOLS][MAX_PROTECTED_EXPORTS_NAME_LEN] = {};' >> \"$out\"\n"
                  "        printf '%s\\n' '#endif' >> \"$out\"\n"
                  "        ;;\n"
                  "esac\n"
                  "exit 0\n"
              )
              with open(gen_script, "w", encoding="utf-8") as f:
                  f.write(content)
              os.chmod(gen_script, 0o755)
          else:
              print(">> [WARN] %s not found; header generation untouched." % gen_script)

          for bzl_file in ["BUILD.bazel", "modules.bzl"]:
              if os.path.exists(bzl_file):
                  lines = open(bzl_file, encoding="utf-8", errors="ignore").read().splitlines()
                  cleaned = [l for l in lines if "abi_gki_protected_exports" not in l]
                  if len(cleaned) != len(lines):
                      with open(bzl_file, "w", encoding="utf-8") as f:
                          f.write("\n".join(cleaned) + "\n")
                      print(">> Purged protected references out of: %s" % bzl_file)

      - name: 9. Validate generated header script (dash + cc syntax check)
        working-directory: workspace/msm-kernel
        run: |
          set -e
          GEN="scripts/gen_gki_modules_headers.sh"
          if [ -f "$GEN" ]; then
            dash -n "$GEN" || { echo ">> [FATAL] $GEN not valid POSIX sh"; exit 1; }
            tmpd=$(mktemp -d)
            for hdr in gki_module_protected_exports.h gki_module_unprotected.h; do
              dash "$GEN" "$tmpd/$hdr" "$PWD" /dev/null
              echo "#include \"$tmpd/$hdr\"" > "$tmpd/probe.c"
              echo "int main(void){return 0;}" >> "$tmpd/probe.c"
              cc -fsyntax-only "$tmpd/probe.c" || { echo ">> [FATAL] generated $hdr does not compile"; exit 1; }
              echo ">> $hdr: OK"
            done
            rm -rf "$tmpd"
          fi

      - name: 10. Inject KSU + full SUSFS v2 feature flags (manual hooks; APPEND-ONLY)
        working-directory: workspace/msm-kernel
        shell: bash
        run: |
          set -e
          # APPEND-ONLY into Nothing's defconfig/fragments. We never remove or alter
          # Nothing's existing vendor entries -> Glyph/camera/fingerprint stay intact.
          # Unknown/removed CONFIG symbols are harmlessly dropped by olddefconfig
          # (check_defconfig enforcement is neutralized in step 12). We use MANUAL
          # hooks (matches 60_*.patch) rather than kprobe su-hooks: manual hooks are
          # less detectable and the integrated sucompat.c is written for them.
          KSU_FRAG="$(mktemp)"
          # Build the fragment with printf (each line is a single-quoted literal, so
          # the YAML/shell indentation is NOT part of the emitted text -> the config
          # lines land at column 0 in the file, as the kernel config parser requires).
          {
            printf '%s\n' '# --- KernelSU-Next core ---'
            printf '%s\n' 'CONFIG_KSU=y'
            printf '%s\n' 'CONFIG_KSU_MANUAL_HOOK=y'
            printf '%s\n' '# --- SUSFS v2.x features ---'
            printf '%s\n' 'CONFIG_KSU_SUSFS=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_SUS_PATH=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_SUS_MOUNT=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_SUS_KSTAT=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_TRY_UMOUNT=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_SPOOF_UNAME=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_ENABLE_LOG=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y'
            printf '%s\n' 'CONFIG_KSU_SUSFS_OPEN_REDIRECT=y'
            printf '%s\n' '# --- supporting symbols ---'
            printf '%s\n' 'CONFIG_KPROBES=y'
            printf '%s\n' 'CONFIG_HAVE_KPROBES=y'
            printf '%s\n' 'CONFIG_KALLSYMS=y'
            printf '%s\n' 'CONFIG_KALLSYMS_ALL=y'
          } > "$KSU_FRAG"
          while IFS= read -r f; do
            echo ">> appending KSU/SUSFS config to: $f"
            printf '\n' >> "$f"
            cat "$KSU_FRAG" >> "$f"
          done < <(find arch/arm64/configs/ -type f \( -name "*_defconfig" -o -name "*.config" -o -name "*.fragment" \))
          rm -f "$KSU_FRAG"

      - name: 11. Prepare Qualcomm Build Package Extensions
        working-directory: workspace
        run: |
          mkdir -p build
          touch build/BUILD.bazel
          if [ -f msm-kernel/msm_kernel_extensions.bzl ]; then
            cp msm-kernel/msm_kernel_extensions.bzl build/
          elif [ -f msm-kernel/build/msm_kernel_extensions.bzl ]; then
            cp msm-kernel/build/msm_kernel_extensions.bzl build/
          else
            echo "def define_top_level_rules(): pass" > build/msm_kernel_extensions.bzl
            echo "def define_extras(*args, **kwargs): pass" >> build/msm_kernel_extensions.bzl
            echo "def get_build_config_fragments(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def get_dtb_list(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def get_dtbo_list(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def get_dtstree(*args, **kwargs): return \"\"" >> build/msm_kernel_extensions.bzl
            echo "def get_gki_ramdisk_prebuilt_binary(*args, **kwargs): return \"\"" >> build/msm_kernel_extensions.bzl
            echo "def get_vendor_ramdisk_binaries(*args, **kwargs): return []" >> build/msm_kernel_extensions.bzl
            echo "def define_combined_vm_image(*args, **kwargs): pass" >> build/msm_kernel_extensions.bzl
          fi

      - name: 12. Sanitize Obsolete Parameters & Mock OEM Layers
        working-directory: workspace
        shell: python
        run: |
          import os
          import re

          def remove_attribute(content, attr_name):
              pattern = r'\b' + attr_name + r'\s*=\s*'
              while True:
                  match = re.search(pattern, content)
                  if not match:
                      break
                  start_idx = match.start()
                  end_idx = match.end()
                  bracket_count = paren_count = brace_count = 0
                  while end_idx < len(content):
                      char = content[end_idx]
                      if char == '(': paren_count += 1
                      elif char == ')': paren_count -= 1
                      elif char == '[': bracket_count += 1
                      elif char == ']': bracket_count -= 1
                      elif char == '{': brace_count += 1
                      elif char == '}': brace_count -= 1
                      elif char == ',' and bracket_count == 0 and paren_count == 0 and brace_count == 0:
                          end_idx += 1
                          break
                      elif char == '\n' and bracket_count == 0 and paren_count == 0 and brace_count == 0:
                          break
                      end_idx += 1
                  content = content[:start_idx] + content[end_idx:]
              return content

          os.makedirs("nt_project", exist_ok=True)
          with open("nt_project/BUILD.bazel", "w") as f: f.write("")
          with open("nt_project/MODULE.bazel", "w") as f: f.write('module(name = "nt_project")\n')

          symbols = {}

          for root, dirs, files in os.walk("build/kernel"):
              for file in files:
                  if file.endswith((".sh", ".py", ".bzl", ".bsh", ".gki")):
                      p = os.path.join(root, file)
                      try:
                          with open(p, "r", encoding="utf-8", errors="ignore") as f:
                              content = f.read()
                          mutated = False
                          if "check_defconfig" in content:
                              content = re.sub(r'check_defconfig\s*\(\s*\)\s*\{', 'check_defconfig() {\n  return 0\n', content)
                              content = content.replace('POST_DEFCONFIG_CMDS="check_defconfig"', 'POST_DEFCONFIG_CMDS=""')
                              content = content.replace('POST_DEFCONFIG_CMDS=\\"check_defconfig\\"', 'POST_DEFCONFIG_CMDS=\\"\\"')
                              mutated = True
                          if "savedefconfig does not match" in content:
                              content = content.replace("return ${RES}", "return 0")
                              content = content.replace("return $RES", "return 0")
                              content = content.replace("exit ${RES}", "exit 0")
                              content = content.replace("exit $RES", "exit 0")
                              mutated = True
                          if mutated:
                              print("[*] Neutralized defconfig validation in: %s" % p)
                              with open(p, "w", encoding="utf-8") as f:
                                  f.write(content)
                      except Exception as e:
                          print("File patching error: %s" % e)

          for root, dirs, files in os.walk("msm-kernel"):
              for file in files:
                  if file.endswith(".bzl") or file in ["BUILD", "BUILD.bazel"]:
                      fn = os.path.join(root, file)
                      try:
                          with open(fn, "r", encoding="utf-8", errors="ignore") as f:
                              content = f.read()
                          mutated = False
                          if "gki_ramdisk_prebuilt_binary" in content:
                              content = remove_attribute(content, "gki_ramdisk_prebuilt_binary")
                              mutated = True
                          if "nt_project" in content:
                              matches = re.findall(r"load\s*\(\s*[\"\']@nt_project//:dict\.bzl[\"\']\s*,\s*([^)]+)\)", content)
                              for match in matches:
                                  for part in match.split(","):
                                      part = part.strip()
                                      if not part: continue
                                      if "=" in part:
                                          sym = part.split("=")[1].strip().strip('"').strip("'")
                                      else:
                                          sym = part.strip("\"").strip("'")
                                      if sym:
                                          if "module" in sym.lower() or "out" in sym.lower() or "+" in content:
                                              symbols[sym] = "[]"
                                          else:
                                              symbols[sym] = '{"metroid": {}, "sun": {}, "pacman": {}, "pong": {}, "spock": {}, "default": {}}'
                          if mutated:
                              with open(fn, "w", encoding="utf-8") as f:
                                  f.write(content)
                      except Exception as e:
                          print("[!] Error processing %s: %s" % (fn, e))

          with open("nt_project/dict.bzl", "w") as f:
              for sym, val in symbols.items():
                  f.write("%s = %s\n" % (sym, val))

      - name: 13. Compile the Kernel via Qualcomm Kleaf
        working-directory: workspace
        run: |
          echo ">> Commencing Kernel Compilation via Qualcomm Bazel..."
          # --lto=thin keeps peak RAM/time down on the GitHub runner; drop it if
          # you want full LTO and the runner has headroom.
          tools/bazel run //msm-kernel:kernel_aarch64_dist --lto=thin -- --dist_dir=out_dist

      - name: 14. Show dist output + upload
        working-directory: workspace
        run: |
          echo ">> Contents of out_dist:"
          ls -la out_dist || true
          # Qualcomm's kernel_aarch64_dist emits Image / Image.gz (+ dtbs). It may
          # NOT emit a ready boot.img. If boot.img is absent, package Image with
          # AnyKernel3 (see the chat notes) - that is the format you actually flash.

      - name: 15. Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nos4.1-metroid-ksunext-susfs2.1.0
          path: |
            workspace/out_dist/Image
            workspace/out_dist/Image.gz
            workspace/out_dist/boot.img
          if-no-files-found: warn
          compression-level: 9
