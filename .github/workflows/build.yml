name: Build Nothing OS 4.1 Kernel (SUSFS)
 
on:
  workflow_dispatch:
 
permissions:
  contents: read
 
jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
 
      - name: 2. Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc curl git python3 python-is-python3 \
            libssl-dev repo flex bison zip unzip cpio kmod pahole \
            libelf-dev binutils-aarch64-linux-gnu
 
      - name: 3. Checkout Nothing Kernel Source (NOS 4.1)
        uses: actions/checkout@v4
        with:
          repository: NothingOSS/android_kernel_msm-6.6_nothing_sm8735
          ref: sm8735/b/mr
          path: msm-kernel
          fetch-depth: 1
 
      - name: 4. Setup Kernel Build Tools (Clang + Binutils)
        run: |
          mkdir -p toolchain
          echo ">> Downloading prebuilt Clang r510928 (Android 15 / 6.6 target)..."
          curl -Lo clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r510928.tar.gz" \
            || curl -Lo clang.tar.gz \
            "https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz"
          tar -xf clang.tar.gz -C toolchain --strip-components=1
          echo "$PWD/toolchain/bin" >> $GITHUB_PATH
 
          echo ">> Verifying clang..."
          $PWD/toolchain/bin/clang --version || true
 
      - name: 5. Inject KernelSU-Next
        working-directory: msm-kernel
        run: |
          echo ">> Downloading and applying KernelSU-Next setup..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
 
          echo ">> Verifying KernelSU directory..."
          KSU_DIR=$(find . -maxdepth 2 -type d -name "KernelSU*" | head -n 1)
          if [ -z "$KSU_DIR" ]; then
            echo "[FATAL] KernelSU directory not found after setup." && exit 1
          fi
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo ">> KernelSU found at: $KSU_DIR"
 
      - name: 6. Inject SUSFS Patches
        working-directory: msm-kernel
        run: |
          echo ">> Cloning SUSFS for GKI Android 15 / 6.6..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-android15-6.6 /tmp/susfs4ksu
 
          echo ">> Copying SUSFS VFS source files into kernel tree..."
          cp -v /tmp/susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp -v /tmp/susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
 
          echo ">> Registering susfs.o in fs/Makefile..."
          if ! grep -q "susfs\.o" fs/Makefile; then
            printf '\nobj-$(CONFIG_KSU_SUSFS) += susfs.o\n' >> fs/Makefile
          fi
 
          echo ">> Applying SUSFS GKI VFS kernel patch..."
          SUSFS_PATCH=$(find /tmp/susfs4ksu/kernel_patches/ \
            -name "50_add_susfs_in_gki*.patch" | sort | tail -n 1)
          if [ -z "$SUSFS_PATCH" ]; then
            echo "[FATAL] SUSFS GKI kernel patch not found." && exit 1
          fi
          echo ">> Applying: $SUSFS_PATCH"
          patch -p1 --forward < "$SUSFS_PATCH" || {
            echo "[WARN] Patch applied with fuzz/offsets — check output above."
          }
 
          echo ">> Applying SUSFS patch to KernelSU-Next..."
          KSU_PATCH=$(find /tmp/susfs4ksu/ksu_patches/ \
            \( -name "*susfs*ksunext*.patch" \
            -o -name "50_add_susfs_in_ksunext*.patch" \) \
            | sort | tail -n 1)
          if [ -z "$KSU_PATCH" ]; then
            echo "[FATAL] KernelSU-Next SUSFS patch not found." && exit 1
          fi
          echo ">> Applying: $KSU_PATCH"
          cd "$KSU_DIR"
          patch -p1 --forward < "$KSU_PATCH" || {
            echo "[WARN] KSU patch applied with fuzz/offsets."
          }
          cd "$OLDPWD"
 
          echo ">> Registering SUSFS Kconfig entry in fs/Kconfig..."
          if ! grep -q "KSU_SUSFS" fs/Kconfig; then
            cat >> fs/Kconfig << 'KCONFIG_EOF'
 
config KSU_SUSFS
	bool "KernelSU SUSFS support"
	depends on KSU
	default y
	help
	  Enable SUSFS masking hooks within KernelSU for GKI VFS layers.
KCONFIG_EOF
          fi
 
      - name: 7. Apply Kernel Config Fragments
        working-directory: msm-kernel
        run: |
          echo ">> Appending KSU + SUSFS config to all relevant defconfigs..."
          find arch/arm64/configs/ -type f \
            \( -name "*defconfig" -o -name "*.config" -o -name "*.fragment" \) \
            | while read -r cfg; do
              echo "" >> "$cfg"
              echo "CONFIG_KSU=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$cfg"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$cfg"
              echo ">> Patched: $cfg"
            done
 
      - name: 8. Build Kernel (Makefile / LLVM)
        working-directory: msm-kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LLVM=1
          export LLVM_IAS=1
 
          # Detect the correct defconfig for sm8735 (Nothing Phone 3a/3a Pro)
          DEFCONFIG=$(find arch/arm64/configs/ -name "*sm8735*" \
            -o -name "*vendor_qki*" 2>/dev/null | head -n 1)
          if [ -z "$DEFCONFIG" ]; then
            DEFCONFIG=$(ls arch/arm64/configs/ | head -n 1)
            echo "[WARN] sm8735 defconfig not found, falling back to: $DEFCONFIG"
          else
            DEFCONFIG=$(basename "$DEFCONFIG")
            echo ">> Using defconfig: $DEFCONFIG"
          fi
 
          echo ">> Generating .config from $DEFCONFIG..."
          make -j$(nproc) O=out ARCH=arm64 "$DEFCONFIG"
 
          echo ">> Starting kernel build..."
          make -j$(nproc) O=out \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image.gz dtbs dtbo.img 2>&1 | tee build.log
 
          echo ">> Build complete. Listing output artifacts..."
          find out/arch/arm64/boot/ -type f | head -30
 
      - name: 9. Package Boot Image (AnyKernel3)
        run: |
          echo ">> Cloning AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel3
 
          echo ">> Copying kernel Image..."
          KERNEL_IMAGE=$(find msm-kernel/out/arch/arm64/boot/ \
            -name "Image.gz" -o -name "Image" | head -n 1)
          if [ -z "$KERNEL_IMAGE" ]; then
            echo "[FATAL] Kernel image not found in output directory." && exit 1
          fi
          cp "$KERNEL_IMAGE" anykernel3/
 
          echo ">> Copying DTBs if present..."
          find msm-kernel/out/arch/arm64/boot/dts/ -name "*.dtb" \
            -exec cp {} anykernel3/dtbs/ \; 2>/dev/null || true
          find msm-kernel/out/arch/arm64/boot/ -name "dtbo.img" \
            -exec cp {} anykernel3/ \; 2>/dev/null || true
 
          echo ">> Zipping AnyKernel3 flashable package..."
          cd anykernel3
          zip -r9 \
            ../NothingOS4.1-KernelSU-SUSFS-sm8735-$(date +%Y%m%d).zip \
            . -x "*.git*" "*.github*" "LICENSE" "README.md"
          cd ..
          echo ">> Package ready."
          ls -lh NothingOS4.1-*.zip
 
      - name: 10. Upload Kernel Package
        uses: actions/upload-artifact@v4
        with:
          name: NothingOS4.1-KernelSU-SUSFS-sm8735
          path: NothingOS4.1-KernelSU-SUSFS-sm8735-*.zip
          compression-level: 6
          if-no-files-found: error
 
